  <!-- Domain 2 (collapsed) -->
  <rect x="20" y="335" width="760" height="36" rx="6" fill="#0a1c30" stroke="#1a2a3a" stroke-width="1"/>
  <text x="45" y="357" fill="#9aabbc" font-family="system-ui" font-size="13" font-weight="600">▶ CR-2: Risk Management</text>
  <text x="680" y="357" fill="#eab308" font-family="monospace" font-size="11">58% · 2.8</text>

  <!-- Domain 3 (collapsed) -->
  <rect x="20" y="380" width="760" height="36" rx="6" fill="#0a1c30" stroke="#1a2a3a" stroke-width="1"/>
  <text x="45" y="402" fill="#9aabbc" font-family="system-ui" font-size="13" font-weight="600">▶ CR-3: Security Operations</text>
  <text x="680" y="402" fill="#22c55e" font-family="monospace" font-size="11">80% · 3.8</text>
