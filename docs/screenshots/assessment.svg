    <text x="80" y="66" fill="#9aabbc" font-family="system-ui" font-size="10">POL-CS-001, Board minutes Q3-2025</text>
    <rect x="600" y="5" width="105" height="24" rx="4" fill="#22c55e20" stroke="#22c55e50" stroke-width="1"/>
    <text x="652" y="21" fill="#22c55e" font-family="system-ui" font-size="10" text-anchor="middle">✓ Saved</text>
  </g>
  
  <!-- Sub-domain 2 -->
