    <circle cx="100" cy="38" r="8" fill="#f97316" opacity="0.3"/><text x="100" y="42" fill="#9aabbc" font-family="monospace" font-size="8" text-anchor="middle">2</text>
    <circle cx="120" cy="38" r="8" fill="#eab308" stroke="#eab308" stroke-width="2"/><text x="120" y="42" fill="#e8e4d8" font-family="monospace" font-size="8" text-anchor="middle">3</text>
    <circle cx="140" cy="38" r="8" fill="#22c55e" opacity="0.3"/><text x="140" y="42" fill="#9aabbc" font-family="monospace" font-size="8" text-anchor="middle">4</text>
    <circle cx="160" cy="38" r="8" fill="#3b82f6" opacity="0.3"/><text x="160" y="42" fill="#9aabbc" font-family="monospace" font-size="8" text-anchor="middle">5</text>
    
