    <text x="15" y="20" fill="#c8a84b" font-family="monospace" font-size="10">CR-1.1</text>
    <text x="70" y="20" fill="#e8e4d8" font-family="system-ui" font-size="11" font-weight="600">Cybersecurity Strategy &amp; Roadmap</text>
    
    <text x="15" y="42" fill="#4a5a6c" font-family="system-ui" font-size="10">Maturity:</text>
