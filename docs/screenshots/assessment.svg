    <rect x="195" y="0" width="200" height="32" rx="6" fill="#0a1c30" stroke="#1a2a3a" stroke-width="1"/>
    <text x="295" y="20" fill="#9aabbc" font-family="system-ui" font-size="12" text-anchor="middle">Operational Resilience</text>
    
